<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mate e Fisica - Ripetizioni con Camillo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --beige-light: #f5f5f4;
            --brown-warm: #78350f;
            --brown-dark: #44403c;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--beige-light);
            color: var(--brown-dark);
            scroll-behavior: smooth;
        }

        .hero-section {
            background-image: linear-gradient(rgba(68, 64, 60, 0.7), rgba(68, 64, 60, 0.7)), url('gargantua-black.jpg');
            background-size: cover;
            background-position: center;
        }

        .btn-primary {
            background-color: var(--brown-warm);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #92400e;
            transform: translateY(-2px);
        }

        .gallery-card {
            overflow: hidden;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .gallery-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-2xl font-extrabold tracking-tight text-stone-800 uppercase">
                Mate <span class="text-amber-800">e Fisica</span>
            </div>
            <a href="#contatti" class="bg-stone-800 text-white px-5 py-2 rounded-full text-sm font-bold">Contattami</a>
        </div>
    </nav>

    <section id="home" class="hero-section min-h-screen flex items-center justify-center text-white pt-20">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-4 leading-tight">
                Il sito <span class="text-amber-400">Mate e Fisica</span>
            </h1>
            <p class="text-xl md:text-2xl mb-10 text-stone-200">
                Impara a navigare l'universo della scienza con spiegazioni semplici e dirette.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="#contatti" class="btn-primary px-10 py-4 rounded-2xl font-bold text-lg shadow-xl">Inizia ora</a>
                <a href="#gallery" class="bg-white/10 backdrop-blur-md border border-white/30 px-10 py-4 rounded-2xl font-bold text-lg hover:bg-white/20">Esplora Foto</a>
            </div>
        </div>
    </section>

    <section id="gallery" class="py-24 bg-stone-200">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-extrabold text-stone-900 uppercase mb-12">L'Universo in Foto</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="gallery-card">
                    <img src="Pulsar.jpg" alt="Pulsar" class="gallery-img">
                    <div class="p-4"><p class="font-bold">Le Pulsar</p></div>
                </div>
                <div class="gallery-card">
                    <img src="OIP.jpg" alt="Nebulosa" class="gallery-img">
                    <div class="p-4"><p class="font-bold">Galassie Remote</p></div>
                </div>
                <div class="gallery-card">
                    <img src="gargantua-black.jpg" alt="Buco Nero" class="gallery-img">
                    <div class="p-4"><p class="font-bold">Gargantua</p></div>
                </div>
            </div>
        </div>
    </section>

    <section id="contatti" class="py-24 bg-white">
        <div class="max-w-4xl mx-auto px-6">
            <div class="bg-stone-900 rounded-[3rem] p-10 md:p-16 text-white text-center">
                <h2 class="text-4xl font-extrabold mb-8 uppercase">Prenota una lezione</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <a href="https://wa.me/393896143982" target="_blank" class="flex items-center justify-center gap-4 p-6 bg-green-600 rounded-2xl font-bold text-xl">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="mailto:camillodistefano2010@gmail.com" class="flex items-center justify-center gap-4 p-6 bg-amber-800 rounded-2xl font-bold text-xl">
                        <i class="fas fa-envelope"></i> Email
                    </a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-stone-500 bg-stone-50">
        <p class="font-bold text-stone-600 uppercase">Mate e Fisica - Camillo</p>
    </footer>

</body>
</html>
